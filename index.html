<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>iSDP Mobile</title>
  <link href="https://cdn.jsdelivr.net/npm/remixicon@4.6.0/fonts/remixicon.css" rel="stylesheet">
  <style>
    :root{
      --primary:#0B6BFF;
      --primary-dark:#0057E7;
      --primary-soft:#EAF2FF;
      --bg:#F7FAFF;
      --card:#FFFFFF;
      --block:#F3F6FC;
      --text:#121826;
      --muted:#667085;
      --subtle:#98A2B3;
      --line:#E6EBF2;
      --success:#16B45F;
      --warn:#FF8A1F;
      --danger:#F53F3F;
      --purple:#6147FF;
      --shadow:0 8px 24px rgba(21,51,99,.08);
      font-family:"PingFang SC","Huawei Sans","Microsoft YaHei",system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    }
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    body{margin:0;min-height:100vh;display:grid;place-items:center;background:#dfe7f4;color:var(--text)}
    button,input,textarea{font:inherit}
    button{cursor:pointer}
    .phone{position:relative;width:min(430px,100vw);height:min(932px,100vh);overflow:hidden;background:var(--bg);box-shadow:0 22px 70px rgba(15,23,42,.28)}
    .app{height:100%;display:grid;grid-template-rows:auto 1fr auto}
    .status{height:45px;background:#fff;display:flex;align-items:end;justify-content:space-between;padding:0 28px 8px;color:#05070A;font-weight:800;font-size:17px}
    .status .icons{display:flex;align-items:center;gap:7px;font-size:18px}
    .battery{width:25px;height:12px;border:2px solid #111;border-radius:4px;position:relative}
    .battery:before{content:"";position:absolute;inset:2px;background:#111;border-radius:1px}.battery:after{content:"";position:absolute;right:-5px;top:3px;width:2px;height:6px;background:#111;border-radius:0 2px 2px 0}
    .topbar{height:72px;background:#fff;display:flex;align-items:center;justify-content:space-between;padding:0 16px;position:relative}
    .user-chip{border:0;background:transparent;display:flex;align-items:center;gap:9px;padding:0;text-align:left;min-width:0}
    .logo{width:48px;height:48px;border-radius:50%;display:grid;place-items:center;background:#fff;box-shadow:0 4px 16px rgba(11,107,255,.12);border:1px solid #EDF2FA;color:var(--primary);font-size:24px;flex:0 0 auto}
    .user-meta{min-width:0;line-height:1.25}.user-meta b{display:block;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.user-meta span{display:block;color:var(--muted);font-size:11px;white-space:nowrap}
    .topbar h1{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:150px;margin:0;text-align:center;font-size:24px;font-weight:600;letter-spacing:0;pointer-events:none}
    .icon-btn{border:0;background:transparent;color:#111827;font-size:25px;width:42px;height:42px;border-radius:12px;display:grid;place-items:center}
    .content{overflow:auto;padding:0 15px 98px;scrollbar-width:none}.content::-webkit-scrollbar{display:none}
    .search-row{display:grid;grid-template-columns:1fr 56px;gap:10px;margin:0 0 12px}
    .search-box{height:52px;border:1px solid var(--line);border-radius:12px;background:#F4F6FA;color:#7A8494;padding:0 16px;display:flex;align-items:center;font-size:16px}
    .search-btn{height:52px;border:0;border-radius:12px;background:linear-gradient(135deg,#0B6BFF,#075FE7);color:#fff;font-size:25px;box-shadow:0 9px 18px rgba(11,107,255,.22)}
    .hero{height:126px;border-radius:14px;background:linear-gradient(135deg,#0068FF 0%,#005BE8 58%,#0B77FF 100%);color:#fff;display:grid;grid-template-columns:1.12fr .88fr;overflow:hidden;padding:24px 22px;margin-bottom:12px;position:relative}
    .hero h2{margin:0 0 12px;font-size:29px;line-height:1;font-weight:800;white-space:nowrap}.hero p{margin:0;font-size:15px;line-height:1.65;color:rgba(255,255,255,.92)}
    .hero-art{position:absolute;right:10px;top:12px;width:154px;height:106px}.device{position:absolute;right:20px;top:5px;width:58px;height:94px;border-radius:13px;background:linear-gradient(160deg,#f8fbff,#9fc5ff);transform:rotate(18deg);box-shadow:0 12px 28px rgba(0,31,103,.28);padding:10px 7px}
    .device i{display:block;height:6px;border-radius:6px;background:#0B6BFF;margin-bottom:8px}.device em{display:block;height:8px;border-radius:8px;background:#dce9ff;margin:7px 0}.chart{position:absolute;left:8px;bottom:5px;width:80px;height:54px;border-radius:14px;background:rgba(255,255,255,.18);backdrop-filter:blur(2px);display:flex;align-items:end;gap:6px;padding:9px}.chart span{width:10px;border-radius:8px;background:#fff}.chart span:nth-child(1){height:18px}.chart span:nth-child(2){height:30px;background:#77C7FF}.chart span:nth-child(3){height:39px}.chip-float{position:absolute;width:38px;height:30px;border-radius:10px;background:rgba(255,255,255,.2);right:82px;top:9px}
    .notice{height:42px;display:flex;align-items:center;justify-content:space-between;padding:0 13px;border-radius:12px;background:#EEF5FF;color:var(--text);margin-bottom:12px;font-size:14px}.notice b{color:var(--primary);font-size:16px}.notice button{border:0;background:transparent;color:var(--primary);font-weight:800;font-size:14px;display:flex;align-items:center;gap:2px}
    .card{background:var(--card);border-radius:18px;padding:16px 14px;margin-bottom:12px;box-shadow:var(--shadow);border:1px solid rgba(230,235,242,.82)}
    .section-title{display:flex;align-items:center;justify-content:space-between;margin-bottom:13px;gap:10px}.section-title h2{margin:0;font-size:20px;line-height:1.2}.section-title button,.link{border:0;background:transparent;color:var(--primary);font-size:14px;font-weight:800;display:flex;align-items:center;gap:2px;padding:0}
    .metrics{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}.metric{min-height:82px;border:0;border-radius:12px;background:linear-gradient(145deg,#F8FAFE,#EFF4FC);padding:12px 9px;text-align:left;position:relative;overflow:hidden}.metric span{display:block;color:#4D596B;font-size:13px}.metric b{display:block;margin-top:6px;font-size:25px;line-height:1;font-weight:800}.metric em{display:block;margin-top:8px;font-style:normal;color:var(--success);font-size:12px}.metric.warn em{color:var(--warn)}.metric.danger em{color:var(--danger)}.metric i{position:absolute;right:9px;top:29px;width:32px;height:32px;border-radius:50%;display:grid;place-items:center;background:#E7F0FF;color:var(--primary);font-size:18px}
    .quick{display:grid;grid-template-columns:repeat(5,1fr);row-gap:17px}.q{border:0;background:transparent;display:grid;justify-items:center;gap:7px;color:var(--text);font-size:14px;min-width:0}.q i{width:44px;height:44px;border-radius:13px;background:linear-gradient(145deg,#F3F7FF,#E9F1FF);display:grid;place-items:center;color:var(--primary);font-size:25px}.q span{white-space:nowrap}
    .project-list,.rows,.history{display:grid;gap:9px}.project-row{border:1px solid var(--line);background:#fff;border-radius:12px;padding:12px;display:block;text-align:left;min-width:0;cursor:pointer}.p-main{display:block;min-width:0}.p-title{display:flex;align-items:center;justify-content:space-between;gap:8px}.p-title b{font-size:15px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.tag{display:inline-flex;align-items:center;border-radius:6px;padding:3px 7px;font-size:12px;font-weight:800;background:#F3F6FC;color:#4D596B;white-space:nowrap}.tag.green{background:#E8F8EF;color:var(--success)}.tag.warn{background:#FFF3E3;color:#D46B08}.tag.red{background:#FFF0F0;color:var(--danger)}
    .meta{margin-top:5px;color:var(--muted);font-size:12px;line-height:1.55;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}.progress{height:5px;border-radius:999px;background:#EEF2F7;overflow:hidden;margin-top:8px}.progress i{display:block;height:100%;border-radius:999px;background:#B7C4D8}
    .tabs{height:68px;background:rgba(255,255,255,.96);backdrop-filter:blur(10px);border-top:1px solid var(--line);display:grid;grid-template-columns:repeat(5,1fr);padding-bottom:env(safe-area-inset-bottom)}.tab{border:0;background:transparent;color:#7D8795;display:grid;justify-items:center;align-content:center;gap:2px;font-size:12px}.tab i{font-size:25px}.tab.active{color:var(--primary);font-weight:800}
    .page{position:absolute;inset:0;background:var(--bg);z-index:20;display:grid;grid-template-rows:auto 1fr auto}.page-nav{height:64px;background:#fff;display:grid;grid-template-columns:44px 1fr 44px;align-items:center;padding:0 12px;border-bottom:1px solid var(--line)}.page-nav h2{margin:0;text-align:center;font-size:20px}.page-nav button{border:0;background:transparent;font-size:25px;color:var(--text)}.page-body{overflow:auto;padding:12px 15px 20px}.page-actions{display:flex;gap:8px;padding:10px 15px calc(10px + env(safe-area-inset-bottom));background:#fff;border-top:1px solid var(--line);box-shadow:0 -2px 10px rgba(21,51,99,.05)}.page-actions button{height:44px;flex:1;min-width:0;border-radius:12px;border:1px solid var(--line);background:#fff;color:var(--text);font-weight:800;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.page-actions .primary{background:var(--primary);border-color:var(--primary);color:#fff}.page-actions .more{flex:0 0 44px;font-size:20px}
    .filter-line{display:flex;gap:8px;overflow:auto;margin-bottom:10px}.filter-line button{border:0;border-radius:999px;background:#EAF2FF;color:var(--primary);padding:8px 12px;font-weight:800;white-space:nowrap}.filter-line button.active{background:var(--primary);color:#fff}
    .list-row{width:100%;border:0;background:#fff;border-radius:13px;padding:12px;margin:0;text-align:left;display:grid;grid-template-columns:1fr auto;gap:10px;border:1px solid var(--line)}.list-row b{font-size:15px}.list-row p{margin:5px 0 0;color:var(--muted);font-size:12px;line-height:1.5}.list-row .right{text-align:right;color:var(--muted);font-size:12px}.list-row .right strong{display:block;color:var(--primary);font-size:16px}
    .stage-head{display:flex;align-items:center;justify-content:space-between;gap:12px}.stage-head h3{margin:0;font-size:18px}.stage-head strong{font-size:24px;color:var(--primary)}
    .stage-flow{display:grid;gap:10px;margin-top:13px}.stage{display:grid;grid-template-columns:24px 1fr auto;gap:8px;align-items:start}.dot{width:22px;height:22px;border-radius:50%;display:grid;place-items:center;background:#EAF2FF;color:var(--primary);font-size:13px;margin-top:1px}.stage.done .dot{background:var(--success);color:#fff}.stage.current .dot{background:var(--primary);color:#fff}.stage.todo .dot{background:#FFF3E3;color:var(--warn)}.stage h4{margin:0;font-size:14px}.stage p{margin:4px 0 0;color:var(--muted);font-size:12px;line-height:1.45}.stage .state{font-size:12px;font-weight:800;color:var(--muted)}.stage.done .state{color:var(--success)}.stage.current .state{color:var(--primary)}.stage.todo .state{color:var(--warn)}
    .kv{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}.kv div{background:#F8FAFE;border-radius:10px;padding:10px}.kv span{display:block;color:var(--muted);font-size:12px}.kv b{display:block;margin-top:5px;font-size:14px}
    .sheet-mask,.mask{position:absolute;inset:0;background:rgba(15,23,42,.38);z-index:40;display:grid}.sheet-mask{align-items:end}.mask{place-items:center;padding:22px}.sheet{width:100%;max-height:78vh;overflow:auto;background:#fff;border-radius:20px 20px 0 0;padding:16px 15px 22px;box-shadow:0 12px 34px rgba(32,56,96,.10)}.sheet h3,.dialog h3{margin:0 0 7px;font-size:19px}.sheet p,.dialog p{margin:0 0 12px;color:var(--muted);font-size:13px;line-height:1.55}.sheet-actions,.dialog-actions{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px}.btn{height:43px;border:0;border-radius:12px;background:var(--primary);color:#fff;font-weight:800}.btn.ghost{background:#EAF2FF;color:var(--primary)}.btn.warn{background:#FFF3E3;color:#D46B08}.field{display:grid;gap:6px;margin:10px 0}.field label{font-size:13px;font-weight:800}.input,.textarea,.select{border:1px solid var(--line);border-radius:12px;background:#fff;color:var(--text);padding:0 12px}.input,.select{height:42px}.textarea{height:78px;padding-top:10px;resize:none}.check-list{display:grid;gap:8px}.check-item{display:grid;grid-template-columns:24px 1fr auto;align-items:center;gap:8px;background:#F8FAFE;border-radius:12px;padding:10px}.check-item input{width:18px;height:18px}.dialog{width:100%;max-width:342px;background:#fff;border-radius:18px;padding:18px;box-shadow:var(--shadow)}
    .menu{position:absolute;right:14px;top:118px;width:228px;background:#fff;border:1px solid var(--line);border-radius:13px;padding:8px;box-shadow:0 12px 34px rgba(32,56,96,.14);z-index:42}.menu button{height:42px;width:100%;border:0;background:#fff;border-radius:10px;text-align:left;padding:0 10px;font-weight:800;color:var(--text)}.menu button:active{background:#F3F6FC}
    .toast{position:absolute;left:50%;bottom:92px;transform:translateX(-50%);max-width:86%;padding:10px 14px;border-radius:999px;background:rgba(18,24,38,.92);color:#fff;font-size:13px;z-index:60;box-shadow:0 10px 30px rgba(0,0,0,.22)}
    [data-action]:active,.project-row:active,.metric:active,.q:active,.list-row:active{transform:scale(.985);opacity:.9}
    @media(max-width:370px){.topbar{padding:0 12px}.topbar h1{width:132px;font-size:22px}.hero h2{font-size:25px}.metrics{gap:6px}.metric b{font-size:21px}.quick{grid-template-columns:repeat(5,1fr);column-gap:2px}.q span{font-size:12px}}
  </style>
</head>
<body>
<div class="phone">
  <div class="app">
    <header>
      <div class="status"><span>9:41</span><span class="icons"><i class="ri-bar-chart-fill"></i><i class="ri-wifi-fill"></i><span class="battery"></span></span></div>
      <div class="topbar">
        <button class="user-chip" id="roleBtn"><span class="logo"><i class="ri-building-4-line"></i></span><span class="user-meta"><b id="userName">王强</b><span id="roleName">交付经理</span></span></button>
        <h1 id="title">工作台</h1>
        <button class="icon-btn" id="moreBtn" aria-label="更多"><i class="ri-more-2-fill"></i></button>
      </div>
    </header>
    <main class="content" id="content"></main>
    <nav class="tabs" id="tabs">
      <button class="tab active" data-tab="home"><i class="ri-layout-grid-fill"></i><span>工作台</span></button>
      <button class="tab" data-tab="project"><i class="ri-briefcase-4-line"></i><span>项目</span></button>
      <button class="tab" data-tab="task"><i class="ri-task-line"></i><span>任务</span></button>
      <button class="tab" data-tab="risk"><i class="ri-alarm-warning-line"></i><span>风险</span></button>
      <button class="tab" data-tab="mine"><i class="ri-user-3-line"></i><span>我的</span></button>
    </nav>
  </div>
</div>
<script>
const content=document.getElementById('content');
const titleEl=document.getElementById('title');
const user={name:'王强',role:'交付经理'};
const projects=[
  {id:'p1',name:'Riyadh 5G Core 交付',customer:'STC Saudi Telecom Company',owner:'张伟',stage:'现场实施',status:'进行中',percent:72,risk:'高',due:'2024-06-30',desc:'设备上架完成 86%，联调脚本待客户窗口确认。'},
  {id:'p2',name:'Dubai Cloud DC 扩容',customer:'Etisalat UAE',owner:'陈璐',stage:'客户验收',status:'验收中',percent:88,risk:'中',due:'2024-06-25',desc:'验收材料已提交，客户补充 2 项性能报告。'},
  {id:'p3',name:'南非 POP 站点集成',customer:'MTN South Africa',owner:'刘洋',stage:'收尾归档',status:'待归档',percent:94,risk:'低',due:'2024-07-05',desc:'回款资料、培训签到表和交付证书待归档。'}
];
const metricDefs=[
  {key:'activeProjects',title:'在交付项目',value:'18',trend:'+2 本周',icon:'ri-briefcase-4-line',type:'project'},
  {key:'todayTasks',title:'今日任务',value:'11',trend:'6 项待处理',icon:'ri-task-line',type:'task'},
  {key:'acceptance',title:'待验收',value:'7',trend:'2 项临期',icon:'ri-checkbox-circle-line',type:'acceptance',warn:true},
  {key:'riskIssues',title:'风险问题',value:'8',trend:'高风险 2',icon:'ri-alarm-warning-line',type:'risk',danger:true},
  {key:'resources',title:'资源待确认',value:'5',trend:'人员/物料',icon:'ri-team-line',type:'resource',warn:true},
  {key:'documents',title:'资料待归档',value:'13',trend:'本周完成 4',icon:'ri-folder-3-line',type:'document'}
];
const listData={
  project:[
    {title:'Riyadh 5G Core 交付',sub:'客户 STC | 阶段 现场实施 | 进度 72%',right:'72%',type:'project',id:'p1'},
    {title:'Dubai Cloud DC 扩容',sub:'客户 Etisalat | 阶段 客户验收 | 进度 88%',right:'88%',type:'project',id:'p2'},
    {title:'南非 POP 站点集成',sub:'客户 MTN | 阶段 收尾归档 | 进度 94%',right:'94%',type:'project',id:'p3'}
  ],
  task:[
    {title:'Riyadh 设备上架照片复核',sub:'责任人 赵敏 | 截止 今日 14:00 | 来源 现场作业',right:'待处理',type:'task'},
    {title:'Dubai 验收材料补充',sub:'责任人 陈璐 | 截止 今日 18:00 | 需上传性能报告',right:'临期',type:'task'},

    {title:'Riyadh 5G Core FAT 确认',sub:'测试项 43/48 | 需客户确认脚本窗口',right:'待确认',type:'acceptance'},
    {title:'南非 POP 交付证书',sub:'证书草稿已生成 | 等待客户签字',right:'待签字',type:'acceptance'}

const pages={
  home:{
    title:'工作台',
    render:()=>`
      <div class="search-row"><div class="search-box">搜索项目 / 站点 / 任务 / 验收单</div><button class="search-btn" data-action="search"><i class="ri-search-line"></i></button></div>

        ${quick('ri-calendar-check-line','日报周报','daily')}
        ${quick('ri-team-line','资源确认','resource')}

content.addEventListener('click',e=>{
  const el=e.target.closest('[data-action]');if(!el)return;
  const action=el.dataset.action;
  if(action==='open-list'){openList(el.dataset.list);return}
  if(action==='detail'){detail(el.dataset.type,el.dataset.id,el.querySelector('b')?.textContent,el.querySelector('p,.meta')?.textContent);return}
  if(action==='quick'){
    const type=el.dataset.type;
    if(type==='risk'){businessForm('risk-form');return}
    if(type==='acceptance'){openList('acceptance');return}
    if(type==='task'){openList('task');return}
    if(type==='resource'){openList('resource');return}
    if(type==='document'){openList('document');return}
    if(type==='cost'){dialog('成本审批','进入费用审批清单前，请先选择关联项目或费用单。','知道了');return}
    dialog(el.textContent.trim(),'已进入对应业务流程，可继续选择项目或站点办理。','知道了');return
  }
  if(action==='batch'){batchSheet();return}
  if(action==='top-action'){businessForm(`${el.dataset.type}-form`);return}
  if(action==='quick-manage'){toast('常用入口已按交付角色排序');return}
  if(action==='search'){openList('project');return}
  if(action==='filter'){el.parentElement.querySelectorAll('button').forEach(b=>b.classList.remove('active'));el.classList.add('active');toast(`已筛选：${el.textContent}`);return}
});
document.querySelector('.phone').addEventListener('click',e=>{
  const el=e.target.closest('[data-action]');const action=el?.dataset.action;
  if(el?.closest('.page')){
    if(action==='open-list'){openList(el.dataset.list);return}
    if(action==='detail'){detail(el.dataset.type,el.dataset.id,el.querySelector('b')?.textContent,el.querySelector('p,.meta')?.textContent);return}
    if(action==='batch'){batchSheet();return}
    if(action==='top-action'){businessForm(`${el.dataset.type}-form`);return}
    if(action==='filter'){el.parentElement.querySelectorAll('button').forEach(b=>b.classList.remove('active'));el.classList.add('active');toast(`已筛选：${el.textContent}`);return}
  }
  if(action==='back'){document.querySelector('.page')?.remove();return}
  if(action==='close'){closeOverlays();return}
  if(action==='page-menu'){menu([{text:'刷新业务状态',action:'refresh'},{text:'查看处理记录',action:'history-doc'},{text:'分享给项目组',action:'share'}]);return}
  if(action==='more-page'){const page=document.querySelector('.page');const more=JSON.parse(page?.dataset.more||'[]');menu(more.length?more:[{text:'查看处理记录',action:'history-doc'}]);return}
  if(['progress-form','risk-form','accept-form','task-form','resource-form','document-form','assign-form','attach-form','escalate-form','sign-form','project-form','log-form'].includes(action)){businessForm(action.includes('risk')?'risk-form':action.includes('accept')||action.includes('sign')?'accept-form':action.includes('resource')?'resource-form':action.includes('document')||action.includes('attach')?'document-form':action.includes('progress')||action.includes('project')?'progress-form':'task-form');return}
  if(action==='role-confirm'){user.role='现场主管';document.getElementById('roleName').textContent=user.role;closeOverlays();toast('已切换为现场主管视图');return}
  if(action==='submit-form'){const msg=el.dataset.message||'操作已提交';closeOverlays();toast(msg);return}
  if(action==='refresh'){closeOverlays();toast('业务状态已刷新');return}
  if(action==='history-doc'){closeOverlays();toast('已打开处理记录');return}
  if(action==='share'){closeOverlays();toast('已分享给项目组');return}
  if(action==='document-list'){openList('document');return}
  if(action==='close-risk'){dialog('关闭风险','请确认风险措施已完成验证，并保留关闭说明。','确认关闭');return}
  if(action==='notice-team'){toast('已通知项目团队');return}
  if(e.target.classList.contains('sheet-mask')||e.target.classList.contains('mask'))closeOverlays();
});
