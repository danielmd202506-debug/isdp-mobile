<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>ISDP Mobile</title>
  <style>
    :root{
      --adm-color-primary:#1677ff;--adm-color-success:#00b578;--adm-color-warning:#ff8f1f;--adm-color-danger:#ff3141;
      --bg:#f5f7fb;--card:#fff;--text:#111827;--weak:#6b7280;--line:#e5e7eb;--radius:14px;
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",Arial,sans-serif;
    }
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    body{margin:0;background:#dfe6f2;color:var(--text);display:grid;place-items:center;min-height:100vh}
    .phone{position:relative;width:min(430px,100vw);height:min(932px,100vh);background:var(--bg);overflow:hidden;box-shadow:0 22px 70px rgba(15,23,42,.28)}
    .app{height:100%;display:grid;grid-template-rows:auto 1fr auto}
    .status{height:env(safe-area-inset-top);background:#fff}.nav{height:54px;background:#fff;display:grid;grid-template-columns:44px 1fr 44px;align-items:center;padding:0 12px;border-bottom:1px solid var(--line)}
    .nav h1{margin:0;text-align:center;font-size:17px}.nav button{border:0;background:transparent;font-size:22px;color:#1f2937}.content{overflow:auto;padding:12px 12px 96px}
    .offline{display:flex;align-items:center;justify-content:space-between;gap:10px;background:#eaf4ff;color:#1158a5;border:1px solid #cfe7ff;border-radius:12px;padding:9px 12px;font-size:12px;margin-bottom:10px}.offline b{color:#0b5cad}
    .card{background:var(--card);border-radius:var(--radius);padding:14px;margin-bottom:12px;box-shadow:0 1px 2px rgba(15,23,42,.04);border:1px solid rgba(229,231,235,.82)}
    .section-title{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}.section-title h2{margin:0;font-size:16px}.section-title a{font-size:12px;color:var(--adm-color-primary);text-decoration:none}
    .metrics{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}.metric{background:#f7faff;border-radius:12px;padding:10px}.metric span{display:block;color:var(--weak);font-size:11px}.metric b{display:block;margin-top:5px;font-size:20px}.metric em{display:block;margin-top:3px;font-style:normal;font-size:11px;color:var(--adm-color-success)}
    .project{display:grid;gap:10px}.project-head{display:flex;justify-content:space-between;gap:10px}.project h3{margin:0;font-size:15px}.tag{display:inline-flex;align-items:center;border-radius:999px;padding:2px 7px;font-size:11px;font-weight:700;background:#eef4ff;color:#1677ff}.tag.green{background:#e8fff6;color:#008f62}.tag.warn{background:#fff6e8;color:#b65c00}.tag.red{background:#fff1f1;color:#d91515}.progress{height:7px;border-radius:8px;background:#edf1f7;overflow:hidden}.progress i{display:block;height:100%;border-radius:8px;background:linear-gradient(90deg,#1677ff,#55c7ff)}
    .quick{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}.q{display:grid;justify-items:center;gap:6px;color:#374151;font-size:12px}.q i{width:42px;height:42px;border-radius:14px;display:grid;place-items:center;background:#eef4ff;color:#1677ff;font-style:normal;font-size:22px}
    .list{display:grid}.item{display:grid;grid-template-columns:auto 1fr auto;gap:10px;align-items:center;padding:12px 0;border-bottom:1px solid var(--line)}.item:last-child{border-bottom:0}.item-icon{width:36px;height:36px;border-radius:12px;background:#eef4ff;display:grid;place-items:center;color:#1677ff}.item-title{font-weight:700;font-size:14px}.item-sub{color:var(--weak);font-size:12px;margin-top:2px}.badge{min-width:22px;height:22px;border-radius:999px;background:var(--adm-color-danger);color:#fff;font-size:12px;display:grid;place-items:center;padding:0 6px}
    .task-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}.task{background:#fff;border:1px solid var(--line);border-radius:14px;padding:13px}.task .ico{font-size:24px}.task b{display:block;margin-top:8px;font-size:14px}.task span{display:block;margin-top:4px;color:var(--weak);font-size:12px}
    .form-row{display:grid;gap:6px;margin-bottom:12px}.form-row label{font-size:13px;font-weight:700}.input{height:40px;border:1px solid var(--line);border-radius:10px;padding:0 12px;background:#fff;color:#111827}.textarea{height:76px;border:1px solid var(--line);border-radius:10px;padding:10px 12px;background:#fff}.btn{height:42px;border:0;border-radius:12px;background:var(--adm-color-primary);color:#fff;font-weight:800;font-size:15px}.btn.ghost{background:#eef4ff;color:#1677ff}.btn.warn{background:#fff6e8;color:#b65c00}.scan{position:absolute;right:18px;bottom:82px;width:58px;height:58px;border-radius:50%;border:0;background:linear-gradient(135deg,#1677ff,#00b7ff);color:#fff;font-size:28px;box-shadow:0 12px 28px rgba(22,119,255,.35);z-index:4}
    .tabs{height:68px;background:#fff;border-top:1px solid var(--line);display:grid;grid-template-columns:repeat(5,1fr);padding-bottom:env(safe-area-inset-bottom)}.tab{border:0;background:#fff;color:#6b7280;display:grid;justify-items:center;align-content:center;gap:3px;font-size:11px}.tab i{font-style:normal;font-size:22px}.tab.active{color:var(--adm-color-primary);font-weight:800}
    .sync-panel{display:grid;gap:8px}.sync-row{display:flex;justify-content:space-between;align-items:center;background:#f8fafc;border-radius:10px;padding:9px 10px;font-size:13px}.sync-row b{color:#1677ff}
    .cost-row{display:grid;grid-template-columns:1fr auto;gap:8px;padding:10px 0;border-bottom:1px solid var(--line)}.cost-row:last-child{border-bottom:0}.amount{font-weight:900}.doc{display:flex;align-items:center;gap:10px;padding:12px;border:1px solid var(--line);border-radius:12px;margin-bottom:8px;background:#fff}.doc i{font-style:normal;font-size:24px}.hidden{display:none}
    @media(max-width:360px){.metrics{grid-template-columns:repeat(2,1fr)}.quick{grid-template-columns:repeat(4,1fr);gap:6px}.q i{width:38px;height:38px}.phone{height:100vh}}
  </style>
</head>
<body>
<div class="phone">
  <div class="app">
    <div>
      <div class="status"></div>
      <div class="nav"><button id="backBtn">‹</button><h1 id="title">项目总览</h1><button id="moreBtn">⋯</button></div>
    </div>
    <main class="content" id="content"></main>
    <nav class="tabs" id="tabs">
      <button class="tab active" data-tab="home"><i>⌂</i><span>首页</span></button>
      <button class="tab" data-tab="field"><i>▣</i><span>现场作业</span></button>
      <button class="tab" data-tab="collab"><i>☷</i><span>协同中心</span></button>
      <button class="tab" data-tab="cost"><i>¥</i><span>经营成本</span></button>
      <button class="tab" data-tab="knowledge"><i>◇</i><span>知识库</span></button>
    </nav>
  </div>
  <button class="scan" id="scanBtn">⌗</button>
</div>
<script>
const content=document.getElementById('content');
const title=document.getElementById('title');
const pages={
  home:{
    title:'项目总览',
    html:`<div class="offline"><span><b>离线优先</b> 已缓存 12 个项目 / 待同步 3 条</span><span>弱网模式</span></div>
    <section class="card"><div class="section-title"><h2>核心指标</h2><a>今日</a></div><div class="metrics">
      <div class="metric"><span>在管项目</span><b>18</b><em>+2 本周</em></div><div class="metric"><span>逾期里程碑</span><b>5</b><em style="color:#ff3141">需处理</em></div><div class="metric"><span>待审批</span><b>26</b><em>批量处理</em></div>
      <div class="metric"><span>EHS隐患</span><b>8</b><em style="color:#ff8f1f">高风险 2</em></div><div class="metric"><span>成本超支</span><b>3</b><em style="color:#ff3141">红色预警</em></div><div class="metric"><span>今日到期</span><b>11</b><em>站点任务</em></div>
    </div></section>
    <section class="card"><div class="section-title"><h2>快捷入口</h2><a>全部</a></div><div class="quick"><div class="q"><i>▤</i><span>周报</span></div><div class="q"><i>!</i><span>风险</span></div><div class="q"><i>⌕</i><span>巡检</span></div><div class="q"><i>☑</i><span>审批</span></div></div></section>
    <section class="card"><div class="section-title"><h2>重点项目</h2><a>筛选</a></div><div class="project">
      ${project('沙特 Riyadh 数据中心交付','执行中','S级','82%',82,'green','待处理问题 4 / 里程碑 2天后到期')}
      ${project('Dubai Core Site 扩容','验收中','A级','64%',64,'warn','EHS 整改 2 / 验收材料待补齐')}
      ${project('南非站点集成交付','收尾','B级','91%',91,'red','回款资料待审批 / 成本偏差 6.2%')}
    </div></section>
    <section class="card"><div class="section-title"><h2>消息&待办</h2><a>全部 26</a></div><div class="list">${item('变更审批','客户新增机柜点位，需 PM 审批','3','☑')}${item('EHS预警','高空作业防护照片待复核','2','!')}${item('日报确认','5 个站点日报待确认','','▤')}</div></section>`
  },
  field:{
    title:'现场作业',
    html:`<section class="card"><div class="section-title"><h2>高频作业</h2><a>离线可用</a></div><div class="task-grid">
      ${task('扫码核验','设备条码 / OCR 到货核验','⌗')}${task('现场留痕','拍照/视频自动加水印','◉')}${task('EHS巡检','标准检查表与隐患上报','!')}${task('问题工单','语音录入，派单闭环','☷')}${task('变更管理','客户签字，线上审批','✎')}${task('交付验收','资料上传，证书生成','☑')}
    </div></section>
    <section class="card"><div class="section-title"><h2>站点任务核查</h2><a>WBS同步</a></div><div class="list">${item('Riyadh-DC-01 设备上架','计划 80% / 实际 75%，需补现场照片','','▣')}${item('Dubai-Site-B 清关确认','物料到货状态待扫码核验','','⌗')}${item('Jeddah-POP 电源测试','今日 18:00 前提交日报','','◷')}</div></section>
    <section class="card"><div class="section-title"><h2>新建现场问题</h2></div><div class="form-row"><label>问题类型</label><input class="input" value="质量 / 安装规范" /></div><div class="form-row"><label>问题描述</label><textarea class="textarea">现场走线与图纸不一致，已拍照留痕。</textarea></div><button class="btn">提交并派单</button></section>`
  },
  collab:{
    title:'协同中心',
    html:`<section class="card"><div class="section-title"><h2>团队&分包</h2><a>WeLink</a></div><div class="list">${item('内部工程师','在岗 12 / 出差 4 / 休假 1','','☷')}${item('分包团队 A','今日工时已填报 86%','','▤')}${item('原厂支持','2 个技术问题待响应','2','◇')}</div></section>
    <section class="card"><div class="section-title"><h2>物料&工具调度</h2><a>供应链</a></div><div class="metrics"><div class="metric"><span>在途物料</span><b>485</b><em>件</em></div><div class="metric"><span>缺料预警</span><b>6</b><em style="color:#ff8f1f">站点</em></div><div class="metric"><span>工具借用</span><b>24</b><em>台套</em></div></div></section>
    <section class="card"><div class="section-title"><h2>会议&沟通</h2></div><div class="list">${item('客户周例会','今天 16:00，议题 4 项','','◷')}${item('项目群消息','12 条未读，含 3 个文件','12','☰')}</div></section>`
  },
  cost:{
    title:'经营成本',
    html:`<section class="card"><div class="section-title"><h2>经营看板</h2><a>财经同步</a></div><div class="metrics"><div class="metric"><span>合同总额</span><b>12.8M</b><em>USD</em></div><div class="metric"><span>回款率</span><b>68%</b><em>+4.2pp</em></div><div class="metric"><span>毛利率</span><b>18.6%</b><em style="color:#ff8f1f">低于目标</em></div></div></section>
    <section class="card"><div class="section-title"><h2>成本异常</h2><a>预算校验</a></div>${cost('人力成本','3.42M','预算占用 76%')}${cost('分包成本','2.18M','超预算 4.8%')}${cost('差旅报销','0.48M','待审批 9 单')}${cost('物料成本','4.26M','正常')}</section>
    <section class="card"><div class="section-title"><h2>费用审批</h2></div><div class="list">${item('差旅报销审批','OCR 识别 6 张票据，预算充足','6','¥')}${item('现场杂费审批','超预算，需要补充说明','1','!')}</div><button class="btn">批量审批</button></section>`
  },
  knowledge:{
    title:'知识库',
    html:`<section class="card"><div class="section-title"><h2>项目文档库</h2><a>离线缓存</a></div>${doc('合同文件 / PO 信息','最新版本，已缓存')}${doc('实施方案与工程图纸','23 个文件，可离线查看')}${doc('测试报告与交付文档','待补齐 3 项')}</section>
    <section class="card"><div class="section-title"><h2>交付标准&FAQ</h2><a>语音搜索</a></div><div class="list">${item('硬件安装规范','机柜、接地、布线标准','','▤')}${item('EHS 全球规范','高空作业、用电安全、防火','','!')}${item('典型故障 FAQ','排查步骤与案例截图','','⌕')}</div></section>
    <section class="card"><div class="section-title"><h2>全局能力</h2></div><div class="sync-panel"><div class="sync-row"><span>本地加密缓存</span><b>开启</b></div><div class="sync-row"><span>多语言</span><b>中 / EN</b></div><div class="sync-row"><span>操作留痕</span><b>100%</b></div></div></section>`
  }
};
function project(name,stage,level,percent,width,color,sub){return `<div class="card" style="box-shadow:none;margin:0;background:#fbfdff"><div class="project-head"><h3>${name}</h3><span class="tag ${color}">${level}</span></div><div class="item-sub">${stage} · ${sub}</div><div class="progress"><i style="width:${width}%"></i></div><div class="item-sub">整体进度 ${percent}</div></div>`}
function item(t,s,b,i){return `<div class="item"><div class="item-icon">${i}</div><div><div class="item-title">${t}</div><div class="item-sub">${s}</div></div>${b?`<div class="badge">${b}</div>`:'›'}</div>`}
function task(t,s,i){return `<div class="task"><div class="ico">${i}</div><b>${t}</b><span>${s}</span></div>`}
function cost(t,a,s){return `<div class="cost-row"><div><b>${t}</b><div class="item-sub">${s}</div></div><div class="amount">${a}</div></div>`}
function doc(t,s){return `<div class="doc"><i>▤</i><div><b>${t}</b><div class="item-sub">${s}</div></div></div>`}
function render(tab){document.querySelectorAll('.tab').forEach(x=>x.classList.toggle('active',x.dataset.tab===tab));title.textContent=pages[tab].title;content.innerHTML=pages[tab].html}
document.getElementById('tabs').addEventListener('click',e=>{const btn=e.target.closest('.tab');if(btn)render(btn.dataset.tab)});
document.getElementById('scanBtn').addEventListener('click',()=>{render('field');setTimeout(()=>alert('扫码入口：支持设备条码、物料签收、站点二维码核验'),50)});
render('home');
</script>
</body>
</html>
